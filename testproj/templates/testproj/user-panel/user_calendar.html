{% extends "testproj/user-panel/base_user.html" %}
{% load static %}
{% block title %}My Calendar{% endblock %}
{% block nav_calendar %}active{% endblock %}

{% block content %}
  <div class="page-header">
    <p class="eyebrow">My Account</p>
    <h1>My Calendar</h1>
    <div class="divider-line"></div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 300px;gap:2rem;align-items:start;">

    <!-- Calendar -->
    <div>
      <!-- Month nav -->
      <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem;">
        <button class="cal-nav-btn" id="prevMonth" aria-label="Previous month">‹</button>
        <h2 id="calTitle" style="font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:400;color:var(--text);min-width:220px;text-align:center;"></h2>
        <button class="cal-nav-btn" id="nextMonth" aria-label="Next month">›</button>
      </div>

      <div class="cal-wrap">
        <div class="cal-grid" id="calGrid"></div>
      </div>

      <!-- Legend -->
      <div style="display:flex;flex-wrap:wrap;gap:1rem;margin-top:1rem;">
        <div class="leg-item"><div class="leg-dot" style="background:#c9a84c;"></div>Booked</div>
        <div class="leg-item"><div class="leg-dot" style="background:#2980b9;"></div>Rescheduled</div>
        <div class="leg-item"><div class="leg-dot" style="background:#1e8449;"></div>Ongoing</div>
        <div class="leg-item"><div class="leg-dot" style="background:#7f8c8d;"></div>Done</div>
        <div class="leg-item"><div class="leg-dot" style="background:#c0392b;"></div>Canceled</div>
      </div>
    </div>

    <!-- Right: events this month -->
    <div>
      <div style="background:var(--card-bg);padding:1.5rem;">
        <p style="font-size:0.62rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold);margin-bottom:0.7rem;">This Month</p>
        <div id="monthSummary" style="margin-bottom:1.2rem;"></div>
        <p style="font-size:0.62rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold);margin-bottom:0.7rem;">Events</p>
        <div id="monthEvents"></div>
      </div>
    </div>

  </div>

  <!-- Event detail modal -->
  <div class="modal-overlay" id="eventModal">
    <div class="modal">
      <button class="modal__close" id="modalClose">✕</button>
      <p class="modal__eyebrow" id="modalVenue"></p>
      <h2 class="modal__title" id="modalTitle"></h2>
      <div class="modal__divider"></div>
      <div class="modal__grid" id="modalGrid"></div>
      <div class="modal__actions">
        <a class="modal__btn-submit" id="modalManageLink" href="#">Manage Booking</a>
        <button class="modal__btn-cancel" id="modalCancel">Close</button>
      </div>
    </div>
  </div>

  <style>
    .cal-nav-btn { background: var(--card-bg); border: 1px solid var(--input-border); color: var(--text); font-size: 1.2rem; width: 38px; height: 38px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
    .cal-nav-btn:hover { border-color: var(--gold); color: var(--gold); }

    .cal-wrap { background: var(--card-bg); padding: 1.5rem; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-day-name { text-align: center; font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); padding: 0.3rem 0; }
    .cal-day { text-align: center; font-size: 0.82rem; padding: 0.5rem 0.2rem; min-height: 44px; display: flex; flex-direction: column; align-items: center; gap: 3px; color: var(--text); position: relative; }
    .cal-day--empty { }
    .cal-day--today { background: rgba(201,168,76,0.12); font-weight: 500; color: var(--gold); }
    .cal-day--past { color: var(--text-muted); opacity: 0.5; }
    .cal-day--has-event { cursor: pointer; }
    .cal-day--has-event:hover { background: rgba(201,168,76,0.08); }
    .cal-dot { width: 6px; height: 6px; border-radius: 50%; }

    .leg-item { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; color: var(--text-muted); }
    .leg-dot { width: 9px; height: 9px; border-radius: 50%; }

    .month-event-item { padding: 0.7rem 0; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 0.8rem; text-decoration: none; }
    .month-event-item:last-child { border-bottom: none; }
    .month-event-item:hover .ev-title { color: var(--gold); }
    .ev-date-box { width: 38px; text-align: center; flex-shrink: 0; }
    .ev-date-num { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 300; color: var(--text); line-height: 1; display: block; }
    .ev-date-mon { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); display: block; }
    .ev-sep { width: 1px; background: var(--border); align-self: stretch; flex-shrink: 0; }
    .ev-title { font-size: 0.85rem; color: var(--text); transition: color 0.2s; display: block; }
    .ev-meta { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; display: block; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9999; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; padding: 2.5rem; max-width: 460px; width: 92%; position: relative; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.25); }
    .modal__eyebrow { font-size: 0.62rem; letter-spacing: 0.3em; text-transform: uppercase; color: #c9a84c; margin-bottom: 0.3rem; }
    .modal__title { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 400; color: #1a2e1a; }
    .modal__divider { width: 36px; height: 1px; background: #c9a84c; margin: 0.8rem 0 1.2rem; }
    .modal__grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem 1.5rem; }
    .modal__item span:first-child { font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase; color: #888; display: block; margin-bottom: 2px; }
    .modal__item span:last-child { font-size: 0.88rem; color: #1a2e1a; }
    .modal__actions { display: flex; gap: 1rem; margin-top: 1.5rem; }
    .modal__btn-submit { flex: 1; padding: 0.9rem; background: #1a2e1a; color: #fff; border: none; font-family: 'Jost', sans-serif; font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; text-decoration: none; text-align: center; display: block; }
    .modal__btn-submit:hover { background: #2d4a2d; }
    .modal__btn-cancel { padding: 0.9rem 1.5rem; background: transparent; color: #888; border: 1px solid #ddd; font-family: 'Jost', sans-serif; font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
    .modal__btn-cancel:hover { border-color: #1a2e1a; color: #1a2e1a; }
    .modal__close { position: absolute; top: 1rem; right: 1.2rem; font-size: 1.4rem; background: none; border: none; cursor: pointer; color: #bbb; line-height: 1; }
    .modal__close:hover { color: #1a2e1a; }
  </style>

  <script>
    // Booking data injected from Django
    (function () {
      try { window.USER_BOOKINGS = JSON.parse('{{ bookings_json|safe|escapejs }}'); }
      catch (e) { window.USER_BOOKINGS = []; }
    })();

    const BOOKINGS = window.USER_BOOKINGS;
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    const STATUS_COLOR = {
      booked:      '#c9a84c',
      rescheduled: '#2980b9',
      ongoing:     '#1e8449',
      done:        '#7f8c8d',
      canceled:    '#c0392b',
      available:   '#27ae60',
      unavailable: '#c0392b',
    };

    let current = new Date();

    function getBookingsForMonth(y, m) {
      return BOOKINGS.filter(b => {
        const d = new Date(b.date);
        return d.getFullYear() === y && d.getMonth() === m;
      }).sort((a, b) => new Date(a.date) - new Date(b.date));
    }

    function getBookingsForDay(y, m, d) {
      return BOOKINGS.filter(b => {
        const dt = new Date(b.date);
        return dt.getFullYear() === y && dt.getMonth() === m && dt.getDate() === d;
      });
    }

    function render() {
      const y     = current.getFullYear();
      const m     = current.getMonth();
      const today = new Date();

      document.getElementById('calTitle').textContent = `${MONTHS[m]} ${y}`;

      const grid = document.getElementById('calGrid');
      grid.innerHTML = '';

      // Day name headers
      DAYS.forEach(name => {
        const el = document.createElement('div');
        el.className = 'cal-day-name';
        el.textContent = name;
        grid.appendChild(el);
      });

      // Empty cells
      const firstDay = new Date(y, m, 1).getDay();
      for (let i = 0; i < firstDay; i++) {
        const el = document.createElement('div');
        el.className = 'cal-day cal-day--empty';
        grid.appendChild(el);
      }

      // Day cells
      const daysInMonth = new Date(y, m + 1, 0).getDate();
      for (let d = 1; d <= daysInMonth; d++) {
        const el        = document.createElement('div');
        const thisDay   = new Date(y, m, d);
        const isPast    = thisDay < new Date(today.getFullYear(), today.getMonth(), today.getDate());
        const isToday   = (d === today.getDate() && m === today.getMonth() && y === today.getFullYear());
        const dayEvents = getBookingsForDay(y, m, d);

        let cls = 'cal-day';
        if (isToday)            cls += ' cal-day--today';
        else if (isPast)        cls += ' cal-day--past';
        if (dayEvents.length)   cls += ' cal-day--has-event';

        el.className = cls;

        const num = document.createElement('span');
        num.textContent = d;
        el.appendChild(num);

        // Dots for each event
        dayEvents.forEach(ev => {
          const dot = document.createElement('div');
          dot.className = 'cal-dot';
          dot.style.background = STATUS_COLOR[ev.status] || '#888';
          el.appendChild(dot);
        });

        if (dayEvents.length) {
          el.addEventListener('click', () => openModal(dayEvents[0]));
        }

        grid.appendChild(el);
      }

      renderSidePanel(y, m);
    }

    function renderSidePanel(y, m) {
      const events = getBookingsForMonth(y, m);

      document.getElementById('monthSummary').innerHTML = `
        <div style="padding:0.7rem 0.9rem;background:var(--bg);border-left:3px solid var(--gold);display:flex;justify-content:space-between;">
          <span style="font-size:0.82rem;color:var(--text);font-weight:500;">${MONTHS[m]} ${y}</span>
          <span style="font-size:0.75rem;color:var(--text-muted);">${events.length} event${events.length !== 1 ? 's' : ''}</span>
        </div>`;

      if (!events.length) {
        document.getElementById('monthEvents').innerHTML =
          '<p style="font-size:0.8rem;color:var(--text-muted);font-style:italic;">No events this month.</p>';
        return;
      }

      document.getElementById('monthEvents').innerHTML = events.map(b => {
        const dt  = new Date(b.date);
        const day = String(dt.getDate()).padStart(2, '0');
        const mon = MONTHS[dt.getMonth()].substring(0, 3);
        return `
          <a class="month-event-item" href="${b.detailUrl}">
            <div class="ev-date-box">
              <span class="ev-date-num">${day}</span>
              <span class="ev-date-mon">${mon}</span>
            </div>
            <div class="ev-sep"></div>
            <div>
              <span class="ev-title">${b.event_name || 'Private Event'}</span>
              <span class="ev-meta">${b.venue_label} · <span style="color:${STATUS_COLOR[b.status]||'#888'}">${b.status}</span></span>
            </div>
          </a>`;
      }).join('');
    }

    function openModal(b) {
      document.getElementById('modalVenue').textContent = b.venue_label;
      document.getElementById('modalTitle').textContent = b.event_name || 'Private Event';
      document.getElementById('modalManageLink').href   = b.detailUrl;
      const statusBadge = `<span class="badge badge-${b.status}" style="font-size:0.75rem;padding:3px 10px;letter-spacing:0.08em;">${b.status}</span>`;
      document.getElementById('modalGrid').innerHTML = `
        <div class="modal__item"><span>Date</span><span>${b.date}</span></div>
        <div class="modal__item"><span>Status</span><span>${statusBadge}</span></div>
        <div class="modal__item"><span>Time Slot</span><span>${b.time_slot || '—'}</span></div>
        <div class="modal__item"><span>Guests</span><span>${b.pax || '—'}</span></div>
      `;
      document.getElementById('eventModal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('eventModal').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.getElementById('prevMonth').addEventListener('click', () => { current.setMonth(current.getMonth() - 1); render(); });
    document.getElementById('nextMonth').addEventListener('click', () => { current.setMonth(current.getMonth() + 1); render(); });
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalCancel').addEventListener('click', closeModal);
    document.getElementById('eventModal').addEventListener('click', function (e) { if (e.target === this) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    render();
  </script>
{% endblock %}
