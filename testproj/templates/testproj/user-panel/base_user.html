{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}My Bookings{% endblock %} — Quartet Pavilion</title>
  <link rel="icon" href="{% static 'testproj/images/quartetlogo.png' %}" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green-dark: #1a2e1a; --green-mid: #2d4a2d; --gold: #c9a84c;
      --bg: #f5f2ea; --card-bg: #fff9f0; --text: #2a1f0e;
      --text-muted: #8a7a62; --border: #e8e0d0; --row-hover: #fdf6ec;
      --input-bg: #fff9f0; --input-border: #d8cdb8;
    }
    body { font-family: 'Jost', sans-serif; background: var(--bg); display: flex; min-height: 100vh; color: var(--text); }

    /* Sidebar */
    .user-sidebar { width: 240px; background: #0d1a0d; color: #fff; min-height: 100vh; display: flex; flex-direction: column; flex-shrink: 0; border-right: 1px solid rgba(201,168,76,0.12); }
    .us-brand { padding: 2.2rem 1.8rem 1.8rem; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .us-brand .b-top { font-size: 0.55rem; letter-spacing: 0.4em; text-transform: uppercase; color: var(--gold); display: block; margin-bottom: 2px; }
    .us-brand .b-main { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 300; letter-spacing: 0.1em; display: block; color: #fff; }
    .us-brand .b-sub { font-size: 0.5rem; letter-spacing: 0.45em; text-transform: uppercase; color: rgba(255,255,255,0.4); display: block; margin-bottom: 6px; }
    .us-brand .b-badge { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); background: rgba(201,168,76,0.12); padding: 3px 8px; display: inline-block; border: 1px solid rgba(201,168,76,0.2); }
    .us-nav { padding: 1.5rem 0; flex: 1; }
    .us-nav .nav-section { font-size: 0.6rem; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(255,255,255,0.25); padding: 0 1.8rem; margin-bottom: 0.5rem; margin-top: 1.2rem; }
    .us-nav a { display: flex; align-items: center; gap: 10px; color: rgba(255,255,255,0.55); text-decoration: none; padding: 0.65rem 1.8rem; font-size: 0.82rem; letter-spacing: 0.04em; transition: all 0.2s; border-left: 2px solid transparent; }
    .us-nav a:hover { color: #fff; background: rgba(201,168,76,0.06); }
    .us-nav a.active { color: var(--gold); border-left-color: var(--gold); background: rgba(201,168,76,0.1); }
    .us-nav .icon { font-size: 0.9rem; width: 16px; text-align: center; }
    .us-footer { padding: 1.5rem 1.8rem; border-top: 1px solid rgba(255,255,255,0.06); }
    .us-footer .user-name { font-size: 0.7rem; color: rgba(255,255,255,0.35); letter-spacing: 0.05em; margin-bottom: 0.8rem; }
    .us-footer a { display: block; font-size: 0.75rem; color: rgba(255,255,255,0.45); text-decoration: none; letter-spacing: 0.05em; }
    .us-footer a:hover { color: #fff; }

    /* Main content */
    .user-main { flex: 1; padding: 2.5rem 3rem; overflow-y: auto; }
    .page-header { margin-bottom: 2rem; }
    .page-header .eyebrow { font-size: 0.62rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.3rem; }
    .page-header h1 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 400; color: var(--text); }
    .page-header .divider-line { width: 40px; height: 1px; background: var(--gold); margin-top: 0.8rem; }

    /* Shared components */
    .card { background: var(--card-bg); }
    .table-card { background: var(--card-bg); }
    .table-header { padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .table-header h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 400; color: var(--text); }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 0.8rem 1.5rem; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); }
    td { padding: 0.9rem 1.5rem; font-size: 0.85rem; border-bottom: 1px solid var(--border); color: var(--text); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--row-hover); }

    .badge { padding: 3px 10px; font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; }
    .badge-booked      { background: rgba(201,168,76,0.15);  color: #b8942e; }
    .badge-canceled    { background: rgba(192,57,43,0.12);   color: #c0392b; }
    .badge-rescheduled { background: rgba(52,152,219,0.12);  color: #2980b9; }
    .badge-ongoing     { background: rgba(46,204,113,0.15);  color: #1e8449; }
    .badge-done        { background: rgba(127,140,141,0.15); color: #7f8c8d; }
    .badge-available   { background: rgba(30,132,73,0.12);   color: #27ae60; }
    .badge-unavailable { background: rgba(192,57,43,0.12);   color: #c0392b; }

    .btn-primary { background: var(--green-dark); color: #fff; padding: 0.6rem 1.2rem; text-decoration: none; font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; border: none; cursor: pointer; font-family: 'Jost', sans-serif; transition: background 0.2s; display: inline-block; }
    .btn-primary:hover { background: var(--green-mid); }
    .btn-ghost { background: transparent; color: var(--text); padding: 0.6rem 1.2rem; text-decoration: none; font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; border: 1px solid var(--input-border); cursor: pointer; font-family: 'Jost', sans-serif; transition: all 0.2s; display: inline-block; }
    .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
    .btn-danger-sm { background: transparent; color: #c0392b; padding: 0.4rem 0.8rem; font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; border: 1px solid rgba(192,57,43,0.3); cursor: pointer; font-family: 'Jost', sans-serif; transition: all 0.2s; }
    .btn-danger-sm:hover { background: rgba(192,57,43,0.08); }
    .btn-action { color: var(--gold); font-size: 0.8rem; text-decoration: none; letter-spacing: 0.05em; }
    .btn-action:hover { color: #d4b05a; }
    .alert-success { background: rgba(30,132,73,0.1); color: #27ae60; border-left: 3px solid #27ae60; padding: 10px 16px; font-size: 0.82rem; margin-bottom: 1.5rem; }
    .alert-error { background: rgba(192,57,43,0.1); color: #c0392b; border-left: 3px solid #c0392b; padding: 10px 16px; font-size: 0.82rem; margin-bottom: 1.5rem; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1.2rem; margin-bottom: 2.5rem; }
    .stat-card { background: var(--card-bg); padding: 1.6rem; border-bottom: 2px solid var(--gold); }
    .stat-card .num { font-family: 'Cormorant Garamond', serif; font-size: 2.8rem; font-weight: 300; color: var(--gold); line-height: 1; }
    .stat-card .label { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); margin-top: 6px; }
  </style>
</head>
<body>

  <aside class="user-sidebar">
    <div class="us-brand">
      <span class="b-top">Est. 2026</span>
      <span class="b-main">QUARTET</span>
      <span class="b-sub">Pavilion</span>
      <span class="b-badge">My Bookings</span>
    </div>

    <nav class="us-nav">
      <div class="nav-section">My Account</div>
      <a href="{% url 'user_dashboard' %}" class="{% block nav_dashboard %}{% endblock %}">
        <span class="icon">◈</span> Dashboard
      </a>
      <a href="{% url 'user_bookings' %}" class="{% block nav_bookings %}{% endblock %}">
        <span class="icon">◷</span> My Bookings
      </a>
      <a href="{% url 'user_calendar' %}" class="{% block nav_calendar %}{% endblock %}">
        <span class="icon">📅</span> Calendar
      </a>

      <div class="nav-section">Site</div>
      <a href="{% url 'home' %}">
        <span class="icon">⌂</span> Back to Site
      </a>
      <a href="{% url 'book' %}">
        <span class="icon">＋</span> New Inquiry
      </a>
    </nav>

    <a href="{% url 'user_logout' %}">
      <span class="icon">logout</span> Logout
    </a>
  </aside>

  <div class="user-main">
    {% block content %}{% endblock %}
  </div>

</body>
</html>
