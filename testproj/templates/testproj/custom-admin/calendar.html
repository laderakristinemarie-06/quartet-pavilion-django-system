{% extends 'testproj/custom-admin/base_admin.html' %}

{% block content %}
<div class="calendar-card">
    <div id="adminCalendar"></div>
</div>

<div class="cal-modal-overlay" id="eventModal">
    <div class="cal-modal">
        <button class="cal-modal__close" id="eventModalClose">&times;</button>
        <h3 id="evVenue" style="color:var(--text-muted); font-size:0.8rem; margin-bottom:0.2rem; text-transform: uppercase; letter-spacing: 1px;"></h3>
        <h2 id="evTitle" style="margin-top:0; margin-bottom: 1.5rem; border-bottom: 1px solid #eee; padding-bottom: 1rem;"></h2>
        
        <div class="cal-modal__grid" id="evGrid">
            </div>

        <div style="margin-top:2rem; display:flex; gap:1rem;">
            <a id="evEditLink" href="#" class="btn btn-primary" style="flex:1; text-align:center; padding: 0.8rem; background: #c9a84c; border: none; color: white; text-decoration: none; border-radius: 4px;">Edit Booking</a>
            <button id="evModalCancel" class="btn btn-secondary" style="flex:1; padding: 0.8rem; cursor: pointer; border-radius: 4px; border: 1px solid #ddd;">Close</button>
        </div>
    </div>
</div>

{{ bookings_json|json_script:"bookings-data" }}

<style>
    /* Ensure the calendar is visible */
    #adminCalendar {
        background: var(--card-bg, #ffffff);
        padding: 1.5rem;
        border-radius: 12px;
        min-height: 700px; /* Critical: prevents 0px height */
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }

    .calendar-card {
        margin: 20px;
    }

    /* Modal Styling */
    .cal-modal-overlay { 
        display:none; 
        position:fixed; 
        inset:0; 
        background:rgba(0,0,0,0.7); 
        z-index:9999; 
        align-items:center; 
        justify-content:center; 
        backdrop-filter: blur(4px);
    }
    .cal-modal-overlay.open { display:flex; }
    
    .cal-modal { 
        background: #fff; 
        padding:2.5rem; 
        max-width:480px; 
        width:92%; 
        position:relative; 
        color: #333; 
        border-radius: 12px;
        box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
    }

    .cal-modal__close { position:absolute; top:1rem; right:1.2rem; font-size:1.5rem; background:none; border:none; cursor:pointer; color: #888; }
    .cal-modal__grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem 1.5rem; }
    
    .cal-modal__item span:first-child { 
        font-size:0.7rem; 
        font-weight: 700;
        text-transform:uppercase; 
        color:#999; 
        display:block; 
        margin-bottom: 2px;
    }
    
    .cal-modal__item span:last-child {
        font-size: 0.95rem;
        color: #444;
    }

    /* Badge styles for the modal */
    .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; text-transform: capitalize; }
    .badge-booked { background: #fef9e7; color: #c9a84c; }
    .badge-canceled { background: #fdedec; color: #e74c3c; }
</style>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        // 1. Extract Data
        const dataElement = document.getElementById('bookings-data');
        if (!dataElement) {
            console.error("Data element #bookings-data not found!");
            return;
        }
        const rawData = JSON.parse(dataElement.textContent);
        
        // 2. Prepare Events
        const ALL_EVENTS = rawData.map(item => {
            let eventColor = '#888';
            const s = item.status?.toLowerCase();
            
            if (s === 'booked')                eventColor = '#c9a84c';
            else if (s === 'canceled' || s === 'unavailable') eventColor = '#e74c3c';
            else if (s === 'rescheduled')      eventColor = '#2980b9';
            else if (s === 'ongoing' || s === 'available')   eventColor = '#27ae60';
            else if (s === 'done')             eventColor = '#7f8c8d';

            return {
                id: item.id,
                title: item.event_name || "Private Event",
                start: item.date,
                color: eventColor,
                extendedProps: {
                    venue: item.venue,
                    venueLabel: item.venue_label,
                    status: item.status,
                    pax: item.pax,
                    timeSlot: item.time_slot,
                    notes: item.notes,
                    name: item.name,
                    editUrl: `/admin-panel/dates/${item.id}/edit/`
                }
            };
        });

        // 3. Render Calendar
        const calEl = document.getElementById('adminCalendar');
        if (!calEl) return;

        const calendar = new FullCalendar.Calendar(calEl, {
            initialView: 'dayGridMonth',
            height: 'auto',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,listMonth'
            },
            events: ALL_EVENTS,
            eventClick: function (info) {
                const ev = info.event.extendedProps;
                
                document.getElementById('evVenue').textContent = ev.venueLabel || 'Standard Venue';
                document.getElementById('evTitle').textContent = info.event.title;
                document.getElementById('evEditLink').href = ev.editUrl;
                
                document.getElementById('evGrid').innerHTML = `
                    <div class="cal-modal__item"><span>Date</span><span>${info.event.startStr}</span></div>
                    <div class="cal-modal__item"><span>Status</span><span class="badge badge-${ev.status}">${ev.status}</span></div>
                    <div class="cal-modal__item"><span>Booked By</span><span>${ev.name || '—'}</span></div>
                    <div class="cal-modal__item"><span>Pax</span><span>${ev.pax || '—'}</span></div>
                    <div class="cal-modal__item"><span>Time Slot</span><span>${ev.timeSlot || '—'}</span></div>
                    <div class="cal-modal__item" style="grid-column:1/-1;"><span>Notes</span><span>${ev.notes || '—'}</span></div>
                `;
                
                document.getElementById('eventModal').classList.add('open');
            }
        });

        calendar.render();

        // 4. Modal Helpers
        const modal = document.getElementById('eventModal');
        const closeModal = () => modal.classList.remove('open');
        
        document.getElementById('eventModalClose').onclick = closeModal;
        document.getElementById('evModalCancel').onclick = closeModal;
        
        window.onclick = (e) => { 
            if(e.target === modal) closeModal(); 
        };

        // 5. Venue Tabs logic (if buttons exist in base_admin)
        document.querySelectorAll('.venue-tab').forEach(btn => {
            btn.addEventListener('click', function () {
                document.querySelectorAll('.venue-tab').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                const selectedVenue = this.dataset.venue;
                calendar.removeAllEvents();
                
                if (!selectedVenue) {
                    calendar.addEventSource(ALL_EVENTS);
                } else {
                    const filtered = ALL_EVENTS.filter(e => e.extendedProps.venue == selectedVenue);
                    calendar.addEventSource(filtered);
                }
            });
        });
    });
</script>
{% endblock %}
