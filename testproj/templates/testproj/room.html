<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quartet Pavilion</title>
  <link rel="icon" href="img/quartetlogo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="all.css">
  <script src="js/all.js" defer></script>
</head>
<body>

  <!-- NAVBAR -->
  <header class="nav">
    <div class="nav-container">
      <div class="login-image">
    <a class="image-brand" href="practicehp.html">
      <span class="ib-top">Est. 2026</span>
      <span class="ib-main">QUARTET</span>
      <span class="ib-sub">Pavilion</span>
    </a>
      <ul class="nav-menu">
        <li><a href="practicehp.html" class="nav-link">Home</a></li>
        <li class="dropdown">
          <a href="#" class="nav-link">About &#9662;</a>
          <div class="dropdown-menu">
            <a href="#">Contact Us</a>
            <a href="events.html">Events</a>
            <a href="log.html">Login</a>
          </div>
        </li>
      </ul>
    </div>
  </header>

  <div class="page-layout">

    <!-- LEFT SIDEBAR -->
    <aside class="sidebar">
      <h1 class="sidebar__title">Birthday<br>Venue</h1>
      <nav class="sidebar__nav" aria-label="Venue sections">
        <a class="sidebar__nav-link" href="overview.html">Overview</a>
        <a class="sidebar__nav-link" href="gallery.html">Gallery</a>
        <a class="sidebar__nav-link sidebar__nav-link--active" href="room.html">Room</a>
        <a class="sidebar__nav-link" href="calendar.html">Calendar</a>
        <a class="sidebar__nav-link" href="testimonials.html">Testimonials</a>
      </nav>
    </aside>

    <!-- CENTER PANEL -->
    <main class="center-panel">

      <!-- Room type tabs -->
      <div class="room-tabs" role="tablist">
        <button class="room-tab room-tab--active" role="tab" data-room="sr" aria-selected="true">
          Superior Room (SR)
        </button>
        <button class="room-tab" role="tab" data-room="dr" aria-selected="false">
          Deluxe Room (DR)
        </button>
      </div>

      <!-- Photo viewer -->
      <div class="room-photo-wrap">
        <img class="room-photo" id="roomPhoto" src="" alt="">
        <button class="photo-arrow--prev" id="photoPrev" aria-label="Previous photo">‹</button>
        <button class="photo-arrow--next" id="photoNext" aria-label="Next photo">›</button>
        <div class="photo-dots" id="photoDots"></div>
      </div>

      <!-- Detail cards -->
      <div class="room-details" id="roomDetails"></div>

    </main>

    <!-- RIGHT PANEL -->
    <aside class="right-panel">
      <p class="right-panel__eyebrow" id="rpEyebrow"></p>
      <h2 class="right-panel__heading" id="rpHeading"></h2>
      <div class="right-panel__divider" aria-hidden="true"></div>
      <p class="right-panel__body" id="rpBody"></p>

      <div class="rate-block">
        <span class="rate-block__price" id="rpRate"></span>
        <span class="rate-block__unit">per night</span>
      </div>

      <ul class="amenity-list" id="rpAmenities"></ul>

      <div class="cta-group">
        <a class="btn--primary" href="book.html">Reserve a Room</a>
        <a class="btn--ghost" href="overview.html">← Back to Overview</a>
      </div>
    </aside>

  </div>

</body>
</html>
