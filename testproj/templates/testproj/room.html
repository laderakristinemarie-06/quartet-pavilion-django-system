{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quartet Pavilion</title>
  <link rel="icon" href="{% static 'testproj/images/quartetlogo.png' %}" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'testproj/css/all.css' %}">
</head>
<body>
   <!-- NAVBAR -->
    <header class="nav">
        <div class="nav-container">
            <div class="login-image">
                <a class="image-brand" href="{% url 'home' %}">
                    <span class="ib-top">Est. 2026</span>
                    <span class="ib-main">QUARTET</span>
                    <span class="ib-sub">Pavilion</span>
                </a>
                <ul class="nav-menu">
                    <li><a href="{% url 'home' %}" class="nav-link">Home</a></li>
                    <li class="dropdown">
                        <a href="#" class="nav-link">About &#9662;</a>
                        <div class="dropdown-menu">
                            <a href="{% url 'about' %}">About Us</a>
                            <a href="{% url 'events' %}">Events</a>
                            <a href="{% url 'log_in' %}">Login</a>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </header>

  <div class="page-layout">

    <!-- LEFT SIDEBAR -->
    <aside class="sidebar">
      <h1 class="sidebar__title">Birthday<br>Venue</h1>
      <nav class="sidebar__nav" aria-label="Venue sections">
        <a class="sidebar__nav-link" href="{% url 'overview' %}">Overview</a>
        <a class="sidebar__nav-link" href="{% url 'gallery' %}">Gallery</a>
        <a class="sidebar__nav-link sidebar__nav-link--active" href="{% url 'room' %}">Room</a>
        <a class="sidebar__nav-link" href="{% url 'calendar' %}">Calendar</a>
        <a class="sidebar__nav-link" href="{% url 'testimonials' %}">Testimonials</a>
      </nav>
    </aside>

    <!-- CENTER PANEL -->
    <main class="center-panel">

      <!-- Room type tabs -->
      <div class="room-tabs" role="tablist">
        <button class="room-tab room-tab--active" role="tab" data-room="sr" aria-selected="true">
          Superior Room (SR)
        </button>
        <button class="room-tab" role="tab" data-room="dr" aria-selected="false">
          Deluxe Room (DR)
        </button>
      </div>

      <!-- Photo viewer -->
      <div class="room-photo-wrap">
        <img class="room-photo" id="roomPhoto" src="" alt="">
        <button class="photo-arrow--prev" id="photoPrev" aria-label="Previous photo">‹</button>
        <button class="photo-arrow--next" id="photoNext" aria-label="Next photo">›</button>
        <div class="photo-dots" id="photoDots"></div>
      </div>

      <!-- Detail cards -->
      <div class="room-details" id="roomDetails"></div>

    </main>

    <!-- RIGHT PANEL -->
    <aside class="right-panel">
      <p class="right-panel__eyebrow" id="rpEyebrow"></p>
      <h2 class="right-panel__heading" id="rpHeading"></h2>
      <div class="right-panel__divider" aria-hidden="true"></div>
      <p class="right-panel__body" id="rpBody"></p>

      <div class="rate-block">
        <span class="rate-block__price" id="rpRate"></span>
        <span class="rate-block__unit">per night</span>
      </div>

      <ul class="amenity-list" id="rpAmenities"></ul>

      <div class="cta-group">
        <a class="btn--primary" href="{% url 'book' %}">Reserve a Room</a>
        <a class="btn--ghost" href="{% url 'overview' %}">← Back to Overview</a>
      </div>
    </aside>

  </div>

  <script>
      /* ── Room data ── */
    const rooms = {
      sr: {
        photos: [
          { src: '{% static "testproj/images/SR1.jpg" %}', alt: 'Superior Room – Bedroom' },
          { src: '{% static "testproj/images/SR2.jpg" %}', alt: 'Superior Room – Lounge Area' },
          { src: '{% static "testproj/images/SR3.jpg" %}', alt: 'Superior Room – Bathroom' },
        ],
        cards: [
          { label: 'Room Type',   value: 'Superior Room' },
          { label: 'Capacity',    value: '2 Guests' },
          { label: 'Bed Size',    value: 'Queen' },
          { label: 'Room Size',   value: '28 sqm' },
          { label: 'View',        value: 'Garden' },
          { label: 'Rate / Night', value: '₱ 4,800' },
        ],
        eyebrow:  'Superior Room',
        heading:  'Comfort Crafted with Provençal Warmth',
        body:     'The Superior Room offers a refined retreat for those who appreciate thoughtful comfort. Dressed in warm linens, earthy tones, and garden-facing windows, each detail has been chosen to welcome you into restful ease.',
        rate:     '₱ 4,800',
        amenities: [
          'Queen-size bed with premium linen',
          'Private en-suite bathroom',
          'Air conditioning & ceiling fan',
          'Complimentary breakfast for 2',
          'Garden terrace access',
          'Free high-speed Wi-Fi',
          'Flat-screen TV & minibar',
        ],
      },
      dr: {
        photos: [
          { src: '{% static "testproj/images/DR1.jpg" %}', alt: 'Deluxe Room – Bedroom' },
          { src: '{% static "testproj/images/DR2.jpg" %}', alt: 'Deluxe Room – Sitting Area' },
          { src: '{% static "testproj/images/DR3.jpg" %}', alt: 'Deluxe Room – Bathroom' },
        ],
        cards: [
          { label: 'Room Type',   value: 'Deluxe Room' },
          { label: 'Capacity',    value: '2–3 Guests' },
          { label: 'Bed Size',    value: 'King' },
          { label: 'Room Size',   value: '42 sqm' },
          { label: 'View',        value: 'Garden & Pool' },
          { label: 'Rate / Night', value: '₱ 6,500' },
        ],
        eyebrow:  'Deluxe Room',
        heading:  'Expansive Luxury in Every Corner',
        body:     'The Deluxe Room invites you into a larger, more indulgent space. A king-size bed, generous sitting area, and sweeping views of the garden and pool make it the ideal choice for guests seeking something truly memorable.',
        rate:     '₱ 6,500',
        amenities: [
          'King-size bed with luxury linen',
          'Spacious private bathroom with soaking tub',
          'Air conditioning, ceiling fan & heated floors',
          'Complimentary breakfast for 2',
          'Private balcony with garden & pool view',
          'Free high-speed Wi-Fi',
          'Flat-screen TV, minibar & Nespresso machine',
          'Evening turndown service',
        ],
      },
    };

    let activeRoom = 'sr';
    let activePhoto = 0;

    /* ── Render photo ── */
    function renderPhoto(room, index) {
      const photo = rooms[room].photos[index];
      const img   = document.getElementById('roomPhoto');
      const dots  = document.getElementById('photoDots');

      img.classList.add('fade');
      setTimeout(() => {
        img.src = photo.src;
        img.alt = photo.alt;
        img.classList.remove('fade');
      }, 300);

      // Rebuild dots
      dots.innerHTML = '';
      rooms[room].photos.forEach((_, i) => {
        const dot = document.createElement('div');
        dot.className = 'photo-dot' + (i === index ? ' photo-dot--active' : '');
        dot.addEventListener('click', () => { activePhoto = i; renderPhoto(activeRoom, i); });
        dots.appendChild(dot);
      });
    }

    /* ── Render detail cards ── */
    function renderCards(room) {
      const grid = document.getElementById('roomDetails');
      grid.innerHTML = rooms[room].cards.map(c => `
        <div class="room-card">
          <span class="room-card__label">${c.label}</span>
          <span class="room-card__value">${c.value}</span>
        </div>`).join('');
    }

    /* ── Render right panel ── */
    function renderPanel(room) {
      const d = rooms[room];
      document.getElementById('rpEyebrow').textContent  = d.eyebrow;
      document.getElementById('rpHeading').textContent  = d.heading;
      document.getElementById('rpBody').textContent     = d.body;
      document.getElementById('rpRate').textContent     = d.rate;

      const list = document.getElementById('rpAmenities');
      list.innerHTML = d.amenities.map(a =>
        `<li class="amenity-list__item">${a}</li>`
      ).join('');
    }

    /* ── Full render ── */
    function render(room) {
      activeRoom  = room;
      activePhoto = 0;
      renderPhoto(room, 0);
      renderCards(room);
      renderPanel(room);

      document.querySelectorAll('.room-tab').forEach(btn => {
        btn.classList.toggle('room-tab--active', btn.dataset.room === room);
        btn.setAttribute('aria-selected', btn.dataset.room === room ? 'true' : 'false');
      });
    }

    /* ── Tab clicks ── */
    document.querySelectorAll('.room-tab').forEach(btn => {
      btn.addEventListener('click', () => render(btn.dataset.room));
    });

    /* ── Arrow clicks ── */
    document.getElementById('photoPrev').addEventListener('click', () => {
      const len = rooms[activeRoom].photos.length;
      activePhoto = (activePhoto - 1 + len) % len;
      renderPhoto(activeRoom, activePhoto);
    });

    document.getElementById('photoNext').addEventListener('click', () => {
      const len = rooms[activeRoom].photos.length;
      activePhoto = (activePhoto + 1) % len;
      renderPhoto(activeRoom, activePhoto);
    });

    /* ── Init ── */
    render('sr');
  </script>

</body>
</html>
